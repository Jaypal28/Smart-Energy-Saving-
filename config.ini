[Detection]
# Confidence threshold for human/animal detection (0.0-1.0)
confidence_threshold = 0.5
# Detection model: yolo, mediapipe, or cascade
detection_model = yolo
# Enable animal detection
enable_animal_detection = true

[Pose]
# Enable pose estimation
enable_pose_estimation = true
# Model: mediapipe or openpose
pose_model = mediapipe
# Motion sensitivity (1-10)
motion_sensitivity = 5

[Brightness]
# Brightness threshold (0-255)
brightness_threshold = 100
# Auto-adjust lighting
auto_adjust_lighting = true
# Target brightness level (0-255)
target_brightness = 150

[Airflow]
# Enable airflow monitoring
enable_airflow_monitoring = true
# Airflow sensor port (leave empty for simulation)
sensor_port = 
# Simulation mode
simulation_mode = true
# Optimal airflow range (min-max in m/s)
optimal_airflow_min = 0.5
optimal_airflow_max = 2.0

[Energy]
# Energy saving mode
energy_saving_mode = true
# Auto-off delay (seconds) when no presence detected
auto_off_delay = 900
# Comfort temperature range (min-max in Celsius)
comfort_temp_min = 20
comfort_temp_max = 24

[GUI]
# Window size
window_width = 1200
window_height = 800
# Update interval (milliseconds)
update_interval = 100

[Camera]
# Camera index (0 for default)
camera_index = 0
# Video resolution width
width = 640
# Video resolution height
height = 480
# FPS limit
fps_limit = 30



